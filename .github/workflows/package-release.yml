name: Package release

# Build Electron desktop installers for an existing GitHub Release tag and
# attach them (NSIS + AppImage/deb + electron-updater feeds). Used when a
# release was cut without packages, or to re-upload after a packaging failure.
#
# Trigger: Actions → Package release → Run workflow → tag=vX.Y.Z

"on":
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to package (e.g. v2.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: package ${{ matrix.name }}
    if: contains(fromJSON('["grok-insider","anomalyco"]'), github.repository_owner)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows, builder: "--win" }
          - { os: ubuntu-latest, name: linux, builder: "--linux" }
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.117

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: package-release-${{ matrix.name }}

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Set package.json version from tag
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          export VERSION="$version"
          node -e "
            const fs = require('fs');
            const f = 'apps/desktop/package.json';
            const j = JSON.parse(fs.readFileSync(f, 'utf8'));
            j.version = process.env.VERSION;
            fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            console.log('desktop version →', j.version);
          "

      # Data bundle is gitignored; without it the packaged app boots to
      # "ENGINE FAILED TO LOAD / bundle fetch failed: 404".
      # Inline cargo so this works even when packaging an older tag that
      # predates scripts/ensure-web-bundle.mjs (workflow YAML is from master).
      - name: Build data bundle into web public
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/ensure-web-bundle.mjs ]; then
            bun scripts/ensure-web-bundle.mjs
          else
            cargo run --release -p poc2-pipeline -- build \
              --out apps/web/public/poc2.bundle.json.gz \
              --patch 0.5.0
          fi
          test -s apps/web/public/poc2.bundle.json.gz

      - name: Build WASM + web export
        shell: bash
        run: |
          set -euo pipefail
          rustup target add wasm32-unknown-unknown
          bun run wasm
          bun run build
          # Fail the package if the export is missing required engine assets.
          test -s apps/web/out/poc2.bundle.json.gz
          test -d apps/web/out/wasm

      - name: Build Windows OCR helper
        if: runner.os == 'Windows'
        run: cargo build -p poc2-windows-ocr --release

      - name: Package desktop (${{ matrix.name }})
        working-directory: apps/desktop
        run: |
          bun run build
          bun x electron-builder ${{ matrix.builder }} --publish never

      # electron-builder should emit latest*.yml when `publish` is configured;
      # if it still skips under --publish never, synthesize the feed.
      - name: Ensure electron-updater feed files
        shell: bash
        run: |
          set -euo pipefail
          out=apps/desktop/dist-packages
          version="${TAG#v}"
          if [ "${{ matrix.name }}" = "windows" ]; then
            if [ ! -f "$out/latest.yml" ]; then
              echo "latest.yml missing — generating fallback"
              node apps/desktop/scripts/write-update-yml.mjs \
                --dir "$out" --version "$version" --platform windows
            fi
            test -f "$out/latest.yml" || { echo "::error::still no latest.yml"; ls -la "$out"; exit 1; }
          else
            if [ ! -f "$out/latest-linux.yml" ]; then
              echo "latest-linux.yml missing — generating fallback"
              node apps/desktop/scripts/write-update-yml.mjs \
                --dir "$out" --version "$version" --platform linux
            fi
            test -f "$out/latest-linux.yml" || { echo "::error::still no latest-linux.yml"; ls -la "$out"; exit 1; }
          fi

      - name: Attach packages to the Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM: ${{ matrix.name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          out=apps/desktop/dist-packages
          assets=(
            "$out"/*.exe
            "$out"/*.AppImage
            "$out"/*.deb
            "$out"/*.blockmap
            "$out"/latest.yml
            "$out"/latest-linux.yml
          )
          existing=()
          for f in "${assets[@]}"; do
            [ -f "$f" ] && existing+=("$f")
          done
          if [ ${#existing[@]} -eq 0 ]; then
            echo "::error::no desktop packages found to upload for ${PLATFORM}"
            ls -la "$out" || true
            exit 1
          fi
          if [ "$PLATFORM" = "windows" ] && [ ! -f "$out/latest.yml" ]; then
            echo "::error::missing latest.yml (electron-updater feed)"
            ls -la "$out" || true
            exit 1
          fi
          if [ "$PLATFORM" = "linux" ] && [ ! -f "$out/latest-linux.yml" ]; then
            echo "::error::missing latest-linux.yml (electron-updater feed)"
            ls -la "$out" || true
            exit 1
          fi
          echo "Uploading to ${TAG}:"
          printf '  %s\n' "${existing[@]}"
          gh release upload "$TAG" "${existing[@]}" --clobber
