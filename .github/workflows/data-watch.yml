name: Data watch (auto-refresh)

# Automated PoE2 data-refresh loop (ADR-0012).
#
# On a schedule (and on demand), check whether upstream game data moved:
#   1. `poc2-pipeline watch` compares the live PoE2 patch pointer + RePoE-fork
#      content hashes against the committed pipeline/data/upstream_state.json.
#   2. If nothing changed, the job ends quietly.
#   3. If something changed, rebuild the 0.5 bundle, diff it against the
#      previous build (restored from CI cache), and open a PR carrying the
#      regenerated upstream_state.json + a human-readable "what's new" report.
#
# A human reviews/merges. The curated fixtures (alloys / emotions / desecrated /
# genesis) are intentionally NOT auto-edited — the PR flags when new mod ids may
# need hand-curated engine_mod_id joins. The workflow opens a *draft* PR against
# the `dev` integration branch (not `master`) so data refreshes flow through the
# same path as features (see CONTRIBUTING.md), rather than committing directly.

"on":
  schedule:
    # Every 6 hours, on the hour. PoE2 patches deploy unpredictably; this keeps
    # detection latency low without hammering upstream.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild + diff + PR even if no upstream change is detected"
        type: boolean
        default: false

# create-pull-request needs to push a branch and open a PR.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-watch
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  STATE_FILE: pipeline/data/upstream_state.json
  BUNDLE_PATCH: "0.5.0"

jobs:
  watch:
    name: Detect upstream change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cachix
        if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        continue-on-error: true
        uses: cachix/cachix-action@v16
        with:
          name: poc2
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-datawatch-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-datawatch-
            cargo-${{ runner.os }}-

      # Exit 0 = no change, 10 = change detected. `--write` updates the state
      # file in the working tree so the PR step can pick up the new hashes.
      - name: Run watch
        id: detect
        run: |
          set +e
          nix develop --command cargo run --release -p poc2-pipeline -- \
            watch --state "$STATE_FILE" --write --report watch-report.json
          code=$?
          set -e
          echo "watch exit code: $code"
          if [ "$code" -eq 10 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::watch failed with exit code $code"
            exit "$code"
          fi

      - name: Upload watch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-report
          path: |
            watch-report.json
            ${{ env.STATE_FILE }}
          if-no-files-found: warn

  refresh:
    name: Rebuild · diff · open PR
    runs-on: ubuntu-latest
    needs: watch
    if: needs.watch.outputs.changed == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_rebuild)
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cachix
        if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        continue-on-error: true
        uses: cachix/cachix-action@v16
        with:
          name: poc2
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-datawatch-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-datawatch-
            cargo-${{ runner.os }}-

      # Restore the previously-built bundle (if any) so we can diff against it.
      # The cache key is fixed so each run reads the prior run's bundle; we
      # refresh the entry every successful run via actions/cache/save below.
      - name: Restore previous bundle
        id: prevcache
        uses: actions/cache/restore@v4
        with:
          # Caches restore at the path they were saved under; the save step
          # archives `new-bundle.json.gz`, which the next step renames into
          # the `prev-bundle.json.gz` baseline slot.
          path: new-bundle.json.gz
          # Saves are run-scoped (`poc2-prev-bundle-<run_id>`, immutable keys
          # can't be overwritten); the prefix restore-key picks up the most
          # recent successful run's bundle.
          key: poc2-prev-bundle-${{ github.run_id }}
          restore-keys: |
            poc2-prev-bundle-

      - name: Stage previous bundle as diff baseline
        run: |
          if [ -f new-bundle.json.gz ]; then
            mv new-bundle.json.gz prev-bundle.json.gz
          fi

      # Re-run watch with --write so the PR carries the updated state file.
      - name: Refresh upstream state
        run: |
          nix develop --command cargo run --release -p poc2-pipeline -- \
            watch --state "$STATE_FILE" --write || true

      - name: Build new bundle
        run: |
          nix develop --command cargo run --release -p poc2-pipeline -- \
            build --out new-bundle.json.gz --patch "$BUNDLE_PATCH"

      - name: Diff against previous bundle
        run: |
          if [ -f prev-bundle.json.gz ]; then
            nix develop --command cargo run --release -p poc2-pipeline -- \
              diff-bundle prev-bundle.json.gz new-bundle.json.gz \
              --out data-diff.md --json data-diff.json
          else
            {
              echo "## Data bundle refresh"
              echo
              echo "_No previous bundle in CI cache — this is the first auto-refresh._"
              echo "_Baseline established; future runs will show a content diff._"
            } > data-diff.md
          fi
          echo "----- diff report -----"
          cat data-diff.md

      # Crafting-surface sanity sweep: catches illegal recommendations /
      # apply-legality regressions introduced by the new data before a human
      # ever sees the PR. Non-fatal (report-only) so it never blocks the PR,
      # but its output is attached for review.
      - name: Audit crafting surface
        run: |
          nix develop --command cargo run --release -p poc2-pipeline --bin audit-matrix -- \
            --bundle new-bundle.json.gz --out audit-matrix.json || \
            echo "::warning::audit-matrix reported issues — see artifact"
        continue-on-error: true

      - name: Save new bundle to cache
        uses: actions/cache/save@v4
        with:
          path: new-bundle.json.gz
          # Overwrite the fixed key so the next run diffs against this build.
          key: poc2-prev-bundle-${{ github.run_id }}
        # cache/save with a run-scoped key + a restore on the fixed prefix keeps
        # the latest build available without immutable-key collisions.

      - name: Upload bundle + diff artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-refresh-${{ github.run_id }}
          path: |
            new-bundle.json.gz
            data-diff.md
            data-diff.json
            audit-matrix.json
            ${{ env.STATE_FILE }}
          if-no-files-found: warn

      - name: Open / update refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/auto-refresh
          base: dev
          draft: true
          commit-message: "data: auto-refresh upstream state (PoE2 ${{ needs.watch.outputs.changed }})"
          title: "data: upstream PoE2 data refresh"
          body-path: data-diff.md
          labels: |
            data
            automated
          add-paths: |
            ${{ env.STATE_FILE }}
