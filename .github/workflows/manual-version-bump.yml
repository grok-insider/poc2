name: Manual Version Bump

# Repo-admin-only escape hatch for deliberate major/minor releases. Automatic
# release-plz PRs follow feat/fix (minor on feat via features_always_increment_minor).
# This workflow opens a version-bump PR into master when admins intentionally
# advance `x` or `y` without waiting for the auto line.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version component to bump
        required: true
        type: choice
        options:
          - minor
          - major
      reason:
        description: Why this major/minor release is needed
        required: false
        type: string
      dry_run:
        description: Compute and show the diff without opening a PR
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  manual-version-bump:
    name: manual version bump
    if: github.repository_owner == 'grok-insider'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      CARGO_NET_RETRY: "10"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Verify actor is a repo admin
        run: |
          set -euo pipefail
          permission="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${GITHUB_ACTOR}/permission" --jq '.permission')"
          if [ "$permission" != "admin" ]; then
            echo "::error::${GITHUB_ACTOR} has '$permission' permission, but manual major/minor bumps require repo admin."
            exit 1
          fi

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          current="$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)"
          if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Cargo.toml workspace version '$current' is not x.y.z."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"

          case "$BUMP" in
            minor) next="${major}.$((minor + 1)).0" ;;
            major) next="$((major + 1)).0.0" ;;
            *)
              echo "::error::Unsupported bump '$BUMP'."
              exit 1
              ;;
          esac

          branch="release-plz-manual-v${next}-${GITHUB_RUN_NUMBER}"
          {
            echo "current=$current"
            echo "next=$next"
            echo "branch=$branch"
          } >> "$GITHUB_OUTPUT"

      - name: Update workspace version
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          # [workspace.package] version first occurrence
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${NEXT_VERSION}\"/" Cargo.toml
          # Internal path deps pin the shared workspace version explicitly
          sed -i -E "s|(poc2-[a-z0-9-]+ = \{ path = \"[^\"]+\", version = \")[^\"]+(\"[, }])|\1${NEXT_VERSION}\2|g" Cargo.toml
          cargo update --workspace

          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "::error::Version bump produced no Cargo.toml or Cargo.lock changes."
            exit 1
          fi

      - name: Generate the AI changelog section
        if: ${{ !inputs.dry_run }}
        uses: grok-insider/release-changelog-action@v1
        with:
          version: ${{ steps.version.outputs.next }}
          range: v${{ steps.version.outputs.current }}..HEAD
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          project-description: "Path of Crafting 2 — PoE2 crafting advisor (Rust WASM + Next.js web + Electron desktop)"
      - name: Normalize the changelog heading (Keep a Changelog)
        if: ${{ !inputs.dry_run }}
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          sed -i -E "0,/^##[[:space:]]+\[?${NEXT}\]?([[:space:]].*)?$/s//## [${NEXT}] - $(date -u +%F)/" CHANGELOG.md

      - name: Show dry-run diff
        if: ${{ inputs.dry_run }}
        run: git diff -- Cargo.toml Cargo.lock

      - name: Open version-bump PR
        if: ${{ !inputs.dry_run }}
        env:
          BUMP: ${{ inputs.bump }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          BRANCH: ${{ steps.version.outputs.branch }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          existing="$(gh pr list --state open --base master --search "chore: release v${NEXT_VERSION} in:title" --json url --jq '.[0].url // empty')"
          if [ -n "$existing" ]; then
            echo "::notice::A release PR for v${NEXT_VERSION} already exists: $existing"
            exit 0
          fi

          gh label create release --color 0e8a16 \
            --description "release PRs (auto line + manual bumps)" \
            2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release v${NEXT_VERSION}"
          git push --set-upstream origin "$BRANCH"

          body="$(mktemp)"
          {
            echo "Manual repo-admin ${BUMP} version bump from v${CURRENT_VERSION} to v${NEXT_VERSION}."
            echo
            if [ -n "$REASON" ]; then
              echo "Reason: $REASON"
              echo
            fi
            echo "Merging this PR updates the single workspace version on master. The Release"
            echo "workflow will then tag and release v${NEXT_VERSION} because release-plz is"
            echo "configured with release_always = true. Desktop package.json is synced to the"
            echo "tag in the artifact job (not in this PR)."
          } > "$body"

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore: release v${NEXT_VERSION}" \
            --body-file "$body" \
            --label release
