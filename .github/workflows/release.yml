name: Release

# Automated versioning + GitHub Releases via release-plz (config: release-plz.toml).
#
# Flow on every push to master:
#   * release-plz-pr      — opens/updates the "release PR" (bumps the single
#                           [workspace.package].version + Cargo.lock, regenerates
#                           CHANGELOG.md from Conventional Commits) and rewrites
#                           that PR's changelog section with AI-written notes.
#   * release-plz-release — when that PR is merged, creates the `vX.Y.Z` tag +
#                           GitHub Release from the changelog.
#   * resolve / artifacts — builds the Electron desktop packages (Windows NSIS,
#                           Linux AppImage + deb) for the released tag and
#                           attaches them to the Release along with
#                           electron-updater feeds (latest.yml / latest-linux.yml)
#                           and optional *.blockmap. Builds are unsigned (OSS).
#
# Manual re-package (e.g. release already cut but packages missing):
#   workflow_dispatch with `tag=vX.Y.Z` → skips release-plz, packages that tag.
#
# Nothing is published to crates.io — see `git_only` in release-plz.toml.

"on":
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to package and attach (e.g. v2.0.0). Skips release-plz."
        required: true
        type: string

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

jobs:
  # Keep the release PR up to date on every push. Merging that PR is what later
  # triggers the `release` job (via the resulting push to master).
  release-plz-pr:
    name: release-plz PR
    # Canonical-org guard (fork protection). Cargo metadata names
    # `anomalyco`; the automation account is `grok-insider` — accept both
    # until the canonical remote is settled (AGENTS.md "Release Notes").
    if: >
      github.event_name == 'push' &&
      contains(fromJSON('["grok-insider","anomalyco"]'), github.repository_owner)
    runs-on: ubuntu-latest
    # release-plz runs `cargo package` per crate to detect changes, which fetches
    # the crates.io index + git deps. That network step is flaky on hosted runners;
    # make cargo retry transient failures and fetch git deps via the system git CLI.
    env:
      CARGO_NET_RETRY: "10"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist the PAT so the AI changelog step can push to the Release PR branch.
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz (release-pr)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # PAT so the release PR triggers required CI (a GITHUB_TOKEN-opened PR doesn't).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      # Rewrite the release PR's CHANGELOG section with user-facing, AI-written notes.
      - name: Check out the Release PR
        if: ${{ steps.release-plz.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail
          pr="$(jq -r '.number // empty' <<<"$PR_JSON")"
          ver="$(jq -r '.releases[0].version // empty' <<<"$PR_JSON")"
          [ -n "$pr" ] && [ -n "$ver" ] || { echo "No release PR to enrich."; exit 0; }
          gh pr checkout "$pr"
          { echo "RP_PR=$pr"; echo "RP_VER=$ver"; } >> "$GITHUB_ENV"

      - name: Generate AI changelog into the Release PR
        if: ${{ env.RP_PR != '' }}
        uses: grok-insider/release-changelog-action@v1
        with:
          version: ${{ env.RP_VER }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          project-description: "PoE2 crafting advisor — Rust/WASM engine + Next.js web app + Electron desktop (poc2)"

      - name: Commit AI changelog to the Release PR
        if: ${{ env.RP_PR != '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs(changelog): generate release notes for v${RP_VER}"
            git push
          fi

  # On a release-PR merge: create the `vX.Y.Z` tag + GitHub Release. Exposes
  # whether a release was cut (and its tag/version) to the artifact jobs below.
  release-plz-release:
    name: release-plz release
    if: >
      github.event_name == 'push' &&
      contains(fromJSON('["grok-insider","anomalyco"]'), github.repository_owner)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release)
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # Resolve the tag/version for packaging: either from a just-created release-plz
  # cut, or from workflow_dispatch input (manual re-package).
  resolve:
    name: resolve release tag
    needs: [release-plz-release]
    # Always run resolve when dispatching; on push only when a release was cut.
    # `always() && !cancelled()` so a skipped release-plz-release (dispatch) still
    # allows this job; `!failure()` keeps a hard release-plz crash from packaging.
    if: |
      always() && !cancelled() && !failure() &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.release-plz-release.outputs.releases_created == 'true'
      )
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - id: r
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          RELEASES: ${{ needs.release-plz-release.outputs.releases }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="${DISPATCH_TAG:?tag input required}"
            # Strip leading v for the app version (v2.0.0 → 2.0.0).
            version="${tag#v}"
          else
            tag="$(echo "$RELEASES" | jq -r '.[0].tag')"
            version="$(echo "$RELEASES" | jq -r '.[0].version')"
          fi
          [ -n "$tag" ] && [ "$tag" != "null" ] || { echo "::error::empty tag"; exit 1; }
          [ -n "$version" ] && [ "$version" != "null" ] || { echo "::error::empty version"; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Packaging tag=$tag version=$version"

  # Build the Electron desktop packages for the released tag and attach them to the
  # Release. Mirrors the windows / desktop-linux lanes in ci.yml (rustup + Bun, no
  # Nix), each independent (fail-fast: false): one platform failing leaves the
  # others (and the tag/Release/changelog) intact, re-runnable.
  artifacts:
    name: package ${{ matrix.name }}
    needs: [resolve]
    # `always()` so a skipped release-plz-release on dispatch doesn't cascade-skip
    # this job after resolve has already succeeded.
    if: always() && needs.resolve.result == 'success'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows, builder: "--win" }
          - { os: ubuntu-latest, name: linux, builder: "--linux" }
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # CLI version must match the wasm-bindgen crate in Cargo.lock.
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.117

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-desktop-${{ matrix.name }}

      - name: Install web deps
        run: bun install --frozen-lockfile

      # Keep the packaged app's version in lockstep with the release tag:
      # electron-builder reads apps/desktop/package.json, which is NOT
      # bumped by release-plz (it owns the Cargo workspace version only).
      - name: Sync desktop package version to the release
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const f = 'apps/desktop/package.json';
            const j = JSON.parse(fs.readFileSync(f, 'utf8'));
            j.version = process.env.VERSION;
            fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
          "

      # The engine ships as WebAssembly; the web export imports lib/wasm/*, so this
      # must run before the web build. build-wasm.mjs warns-and-skips wasm-opt when
      # it's absent (the optimized artifact is covered by the Nix CI lane).
      - name: Build WASM + web export
        run: |
          rustup target add wasm32-unknown-unknown
          bun run wasm
          bun run build

      - name: Build Windows OCR helper
        if: runner.os == 'Windows'
        run: cargo build -p poc2-windows-ocr --release

      - name: Package desktop (${{ matrix.name }})
        working-directory: apps/desktop
        run: |
          bun run build
          bun x electron-builder ${{ matrix.builder }} --publish never

      # `shell: bash` runs in Git Bash on the Windows runner too, keeping one
      # portable upload step across both targets.
      # electron-updater needs latest.yml (Windows) / latest-linux.yml (Linux)
      # plus optional *.blockmap for delta updates — not just the installers.
      # Builds are intentionally unsigned (OSS; no CSC_* secrets).
      - name: Attach packages to the Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM: ${{ matrix.name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          out=apps/desktop/dist-packages
          assets=(
            "$out"/*.exe
            "$out"/*.AppImage
            "$out"/*.deb
            "$out"/*.blockmap
            "$out"/latest.yml
            "$out"/latest-linux.yml
          )
          # Filter to paths that actually exist (nullglob leaves globs empty).
          existing=()
          for f in "${assets[@]}"; do
            [ -f "$f" ] && existing+=("$f")
          done
          if [ ${#existing[@]} -eq 0 ]; then
            echo "::error::no desktop packages found to upload for ${PLATFORM}"
            exit 1
          fi
          # electron-updater feed file is required per platform.
          if [ "$PLATFORM" = "windows" ] && [ ! -f "$out/latest.yml" ]; then
            echo "::error::missing latest.yml (electron-updater feed) in ${out}"
            ls -la "$out" || true
            exit 1
          fi
          if [ "$PLATFORM" = "linux" ] && [ ! -f "$out/latest-linux.yml" ]; then
            echo "::error::missing latest-linux.yml (electron-updater feed) in ${out}"
            ls -la "$out" || true
            exit 1
          fi
          gh release upload "$TAG" "${existing[@]}" --clobber
