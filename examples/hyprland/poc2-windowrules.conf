# Path of Crafting 2 — Hyprland window rules (Phase D.2 / ADR-0009)
#
# Source this file from your hyprland.conf:
#   source = ~/.config/hypr/poc2-windowrules.conf
#
# The class regex matches the Tauri identifier 'ai.anomaly.poc2'
# (see apps/desktop/src-tauri/tauri.conf.json).

# Float so the advisor doesn't fight tiling
windowrulev2 = float, class:^(ai\.anomaly\.poc2)$

# Pin = always-on-top across workspaces
windowrulev2 = pin, class:^(ai\.anomaly\.poc2)$

# Strip the borderchrome for a cleaner overlay look
windowrulev2 = noborder, class:^(ai\.anomaly\.poc2)$

# Initial size + dock to right edge of the primary monitor
windowrulev2 = size 480 720, class:^(ai\.anomaly\.poc2)$
windowrulev2 = move 100% 0, class:^(ai\.anomaly\.poc2)$

# Slight transparency so it doesn't fully obscure the game
windowrulev2 = opacity 0.95, class:^(ai\.anomaly\.poc2)$

# Disable focus-on-spawn so swapping back to PoE2 doesn't lose game focus
windowrulev2 = nofocus, class:^(ai\.anomaly\.poc2)$, title:^(loading)$

# --- Desktop shell (ADR-0010, Electron) -------------------------------
# The Electron app keeps the same class (ai.anomaly.poc2 via appId).
# Item-capture binds (second-instance flag; no portal needed):
#   bind = ALT, C, exec, poc2-desktop --capture
#   bind = CTRL SHIFT, A, exec, poc2-desktop --capture --advanced

# --- In-game overlay, plugin-first (ADR-0013 + hyproverlay) ------------
# On Hyprland/wlroots-Wayland PoC2 first probes the generic hyproverlay
# compositor plugin. Protocol v4 draws row-aligned reward icons/values, the
# drag-confirm calibrator, market cards, and the Search Regex menu; these window
# rules are then only for the desktop app.
# Without the plugin, PoC2 falls back to DEGRADED mode: the overlay panel
# renders inside the main window, so float + pin + dock the MAIN window to keep
# the fallback usable over PoE2.
#
# Float the main window so the in-app price panel behaves like a HUD:
windowrulev2 = float, class:^(ai\.anomaly\.poc2)$
#
# Scan / price / regex binds. On Wayland these go through the second-instance
# flag path like --capture, OR via the GlobalShortcuts portal when the app is
# launched with it enabled:
#   bind = ALT, V, exec, poc2-desktop --scan
#   bind = ALT SHIFT, V, exec, poc2-desktop --watch-rewards
#   bind = ALT, L, exec, poc2-desktop --recalibrate
#   bind = ALT, E, exec, poc2-desktop --price-check
#   bind = ALT, F, exec, poc2-desktop --regex-open
#   bind = ALT SHIFT, F, exec, poc2-desktop --regex-copy
#
# Note: FULL mode uses a transparent Electron window. HYPRLAND-PLUGIN mode uses
# hyproverlay. This float fallback is only for DEGRADED sessions.
