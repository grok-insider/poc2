# Path of Crafting 2 — item-capture binds (ADR-0011)
#
# Source this file from your hyprland.conf:
#   source = ~/.config/hypr/poc2-capture.conf
#
# Flow: the bind pokes the loopback daemon, the daemon injects the game's
# own Ctrl+C (hyprctl sendshortcut, ydotool fallback), reads the item text
# from the clipboard, restores your clipboard, and pushes the item to the
# Path of Crafting web app over a local WebSocket. Hover an item in PoE2
# and press the bind — the advisor imports it instantly.
#
# Requirements:
#  - `poc2-capture serve` running (exec-once below, or a user service)
#  - wl-clipboard installed
#  - optional fallback injector: ydotool (`programs.ydotool.enable = true`
#    on NixOS) for games that ignore compositor-synthesized input
#  - optional OCR mode: grim

# Start the daemon with your session (adjust the path to your install —
# e.g. `cargo install --path crates/capture` puts it in ~/.cargo/bin).
exec-once = poc2-capture serve

# CTRL+SHIFT+D — capture the hovered item into Path of Crafting.
bind = CTRL SHIFT, D, exec, poc2-capture trigger

# CTRL+SHIFT+A — capture with advanced mod descriptions (tiers/ranges).
bind = CTRL SHIFT, A, exec, poc2-capture trigger --advanced

# CTRL+SHIFT+S — screenshot-OCR the tooltip under the cursor instead
# (fallback for vendor/stash cases where the game won't copy).
bind = CTRL SHIFT, S, exec, poc2-capture trigger --ocr
