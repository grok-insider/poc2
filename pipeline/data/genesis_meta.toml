# ---------------------------------------------------------------------------
# Goal presets — community-sourced node allocations. Node references are by
# (womb, exact node name); names that appear on several copies (e.g.
# "Additional Item Chance") match every copy and the UI highlights them all.
# Confidence levels: "measured" (recorded sample), "official" (GGG demo),
# "community" (creator/wiki consensus, no measured EV).
# ---------------------------------------------------------------------------

[[presets]]
id = "divine-farm"
name = "Divine Orb farming"
womb = "currency"
confidence = "community"
summary = "The most popular trade-league money setup: stack Divine chance to ~200% increased, fill with Additional Item Chance, and never block Divines. Reported ~5 Divines per ~16 level-80 Lavish gifts (anecdotal, single-source)."
sources = [
  "Kingdom Twelve — How to Unlock the Full Genesis Tree, Farm Hiveblood & Print Divines — https://www.youtube.com/watch?v=t5_E7xDstGs",
  "EODGamerz — Easy Guide To MAXIMISING the Genesis Tree — https://www.youtube.com/watch?v=BwH6yGstVF0",
]
steps = [
  { node = "Increased Divine Orb Chance", why = "50% increased Divine chance each — take both copies on the way up.", priority = 1 },
  { node = "Nurture Divinity", why = "+100% increased Divine chance — the branch capstone.", priority = 2 },
  { node = "Rebirth", why = "10% chance to consume no Hiveblood — effectively 'buy 10 get 1 free'.", priority = 3 },
  { node = "Additional Item Chance", why = "Fill every remaining point: each copy is +20% Surpassing chance for an extra birthed item (stacks past 100%).", priority = 4, fill = true },
]
avoid = [
  { node = "Known Value", why = "Blocks Divine Orbs entirely — never take it on this setup." },
]
gift_advice = "Use item level 80 Lavish Wombgifts for the farming loop (community reports a large rarity jump at 80); burn cheap low-level gifts purely to reveal nodes."

[[presets]]
id = "exalt-fishing"
name = "Exalted Orb fishing (SSF)"
womb = "currency"
confidence = "official"
summary = "GGG's official demo path: concentrate the pool on Exalted Orbs and multiply them. Community EV ranks it below the Divine/Catalyst setups for trade-league profit, but it is the best SSF target-farm and fishes Greater/Perfect Exalted Orbs."
sources = [
  "GGG — Return of the Ancients: Genesis Tree Deep Dive — https://www.youtube.com/watch?v=LqAO9oQSaCc",
  "BawLoch — Unstable Breach Catalyst Farming (EV discussion) — https://www.youtube.com/watch?v=EqF8dSumiMQ",
]
steps = [
  { node = "Increased Exalted Orb Chance", why = "100% increased Exalt chance per copy.", priority = 1 },
