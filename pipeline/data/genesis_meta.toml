# Genesis Tree curated metadata (PoE2 0.5 "Return of the Ancients").
#
# Companion to `pipeline/data/brequel_tree.json` (a committed snapshot of
# RePoE-fork's `passive_skill_trees/BrequelTree.json`, client 4.5.1.1.6).
# The tree JSON carries machine stat keys only; this file supplies:
#
#   1. `stat_templates`  — stat-key → human-readable line ("{}" = value).
#   2. `node_overrides`  — full descriptions for `brequel_display_*` nodes
#      whose specifics (mod lists, base lists) are not in the stats. Wording
#      follows poe2db.tw / poe2wiki / Fextralife verbatim where possible.
#   3. `wombs`           — branch metadata (Wombgift, point caps, icons).
#   4. `presets`         — community-sourced "best nodes per goal"
#      allocations with citations. All numbers are community estimates.
#   5. `farming` / `videos` — Hiveblood/Wombgift farming notes + vetted
#      video sources surfaced in the UI.
#
# Refresh `brequel_tree.json` from
#   https://repoe-fork.github.io/poe2/passive_skill_trees/BrequelTree.json
# when a patch changes the tree, then re-run the pipeline build.
#
# Point caps are community-confirmed (multi-source): Currency 15, Amulet 15,
# Ring 10, Belt 10 — the 15s include +5 from Breach Atlas passives
# ("Exquisite Design" for Amulet, the Currency equivalent), +2-per-womb
# atlas nodes, quest/Xesht completions. The Breachstone womb has no
# allocatable passives — it only births Breachstones from Revelatory gifts.

schema_version = 1

# ---------------------------------------------------------------------------
# Womb branches
# ---------------------------------------------------------------------------

[wombs.currency]
display_name = "Currency Womb"
wombgift = "Lavish Wombgift"
gift_art = "BreachFruit2"
points = 15
icon_normal = "KeepersCurrencyNode"
icon_notable = "KeepersCurrencyNotable"
blurb = "Births currency: Transmutes through Divines, Catalysts, Breach Splinters, Essences of the Breach, Altered Collarbones and Breachlord Sacs. Blocker notables prune the pool toward what you want."

[wombs.ring]
display_name = "Ring Womb"
wombgift = "Signet Wombgift"
gift_art = "BreachFruit3"
points = 10
icon_normal = "KeepersMiscellaneousNode"
icon_notable = "KeepersMiscellaneousNotable"
blurb = "Births rings, including the Genesis-exclusive Biostatic / Vitalic / Mnemonic / Kinetic / Oneiric / Grasping bases and Breach Rings. Gateway nodes unlock tree-exclusive Caster and Minion modifiers."

[wombs.amulet]
display_name = "Amulet Womb"
wombgift = "Ornate Wombgift"
gift_art = "BreachFruit5"
points = 15
icon_normal = "KeepersEquipmentNode"
icon_notable = "KeepersEquipmentNotable"
blurb = "Births amulets, including the Genesis-exclusive Lament / Portent / Absent / Corona bases. The deepest branch: guaranteed attribute/resistance mods, minimum modifier levels, and max-value suffix nodes."

[wombs.belt]
display_name = "Belt Womb"
wombgift = "Banded Wombgift"
gift_art = "BreachFruit1"
points = 10
icon_normal = "KeepersUniqueNode"
icon_notable = "KeepersUniqueNotable"
blurb = "Births belts, including the Genesis-exclusive Stalking / Invoking / Sinew / Forking bases (+1 Charm Slot). Gateway nodes unlock tree-exclusive Caster and Minion modifiers."

[wombs.breachstone]
display_name = "Breachstone Womb"
wombgift = "Revelatory Wombgift"
gift_art = "BreachFruit4"
points = 0
icon_normal = "MasteryBlank"
icon_notable = "MasteryBlank"
blurb = "No passives — slot a Revelatory Wombgift (auto-assembled from 300 Breach Splinters) to birth a Breachstone. Splinter-acceleration nodes live in the Currency branch."

