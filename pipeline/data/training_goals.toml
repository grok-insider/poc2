# Training corpus (M16.6 + M16.6 expansion).
#
# Each `[[goal]]` describes one training task the offline `train-advisor`
# binary processes: starting from a Normal-rarity item of the given
# class/ilvl, the trained policy attempts to reach the listed target
# concepts under the budget.
#
# v3 ships a 50-goal corpus covering the full meta surface — armour
# slots × major build archetypes (Life / ES / Hybrid), every weapon
# family the engine recognises, jewellery (Ring / Amulet / Belt), and
# Jewel + Quiver utility items. Per `docs/81-engine-training-and-rule-
# encoding-plan.md` §6.6 Tier 3.6 this is the canonical reference set
# the trained-model artefact ships against.
#
# Format:
# - id: stable identifier (matches strategy ids when appropriate)
# - display_name: human-readable
# - item_class: PascalCase ItemClassId
# - ilvl: starting item level
# - budget_div: divine-equivalent ceiling
# - target.prefixes / target.suffixes: list of TargetSpec entries
#   (concept / concept_any / count / min_tier / allow_hybrid)
#
# Convention: the four res concepts collapse into the
# `concept_any = [Fire/Cold/Lightning/All]Resistance` shorthand because
# the trained policy treats them as a single goal-bit (FeatureVec
# bitmap) rather than three distinct keepers.

