# Training corpus (M16.6).
#
# Each `[[goal]]` describes one training task the offline `train-advisor`
# binary processes: starting from a Normal-rarity item of the given
# class/ilvl, the trained policy attempts to reach the listed target
# concepts under the budget.
#
# v3 ships a representative set covering the major gear classes; the
# full ~50-goal corpus from `docs/81-engine-training-and-rule-encoding-plan.md`
# §6.6 lands incrementally as the bundle's CoE weight coverage broadens
# to cover non-recombinable bases (Charms / Tablets / Waystones, M14.7).
#
# Format:
# - id: stable identifier (matches strategy ids when appropriate)
# - display_name: human-readable
# - item_class: PascalCase ItemClassId
# - ilvl: starting item level
# - budget_div: divine-equivalent ceiling
# - target.prefixes / target.suffixes: list of TargetSpec entries
#   (concept / concept_any / count / min_tier / allow_hybrid)

# =====================================================================
# Body armour
# =====================================================================
[[goal]]
id = "body-armour-3xt1-es-tri-res"
display_name = "3xT1 ES BodyArmour with Tri-Res"
item_class = "BodyArmour"
ilvl = 82
budget_div = 200.0

[[goal.target.prefixes]]
concept = "EnergyShield"
count = 3
min_tier = 1
allow_hybrid = true

[[goal.target.suffixes]]
concept_any = ["FireResistance", "ColdResistance", "LightningResistance", "AllResistances"]
count = 2
min_tier = 2

