# Craft of Exile → engine mod-id explicit aliases.
#
# Loaded by `pipeline/src/normalize/coe_to_bundle.rs` to short-circuit
# the case-insensitive substring fuzzy-match for the most common
# naming-convention mismatches between CoE's `name_modifier` and
# RePoE-fork's `ModId`.
#
# Entry shape:
#   [[alias]]
#   coe_name        = "string-as-it-appears-in-CoE"   # case-insensitive
#   engine_mod_id   = "ModId-from-RePoE-fork"
#   note            = "optional human comment"
#
# Authoring workflow:
#   1. Run `cargo run -p poc2-pipeline -- diagnose-coe <bundle.json.gz>`
#      after building a bundle. The diagnose subcommand reports the
#      unmatched CoE mods grouped by frequency.
#   2. For each unmatched name, look up the corresponding engine mod
#      via poe2db.tw or the live RePoE-fork mods.json.
#   3. Add an [[alias]] entry below.
#   4. Re-run `pipeline build` and `diagnose-coe`; watch the join rate
#      climb toward ≥80%.
#
# A.3 of the v1 execution plan. The seed entries below cover the most
# frequent mismatches inferred from RePoE-fork's PoE2 naming
# conventions (Local* prefix for weapon/armour-local mods, the *Per1
# / *Per2 ladder for tier suffixes, etc.).

# ---- Local energy-shield prefixes ------------------------------------
[[alias]]
coe_name = "+# to maximum Energy Shield"
engine_mod_id = "LocalIncreasedEnergyShield"
note = "armour-local flat ES; tier ladder uses *1..*8 suffixes"

[[alias]]
coe_name = "Increased Energy Shield"
engine_mod_id = "LocalIncreasedEnergyShieldPercent"

[[alias]]
coe_name = "+# to maximum Energy Shield (Hybrid Life)"
engine_mod_id = "LocalIncreasedEnergyShieldAndLife"
note = "the canonical ES+Life hybrid prefix on int/dexint armour"

