# === P5 curated additions (crafting-fidelity effort) =======================
# Sourced from `coe-aliases-suggest` (score=1.00 template matches) against the
# live 0.5 bundle, then VERIFIED individually: each engine mod below is
# kind=Explicit, carries NO essence/corrupted/desecrated-only flag, and its
# text_template matches the CoE name (general explicit, not an implicit /
# corrupted / alloy / influence / unique variant). Wrong-domain auto-suggestions
# at score=1.00 (e.g. "+# to Spirit" → AlloySpiritOnBoots1, charge mods →
# Corruption*, attributes → AmuletImplicit*) were deliberately NOT merged.
# ===========================================================================

