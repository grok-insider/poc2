# Build config. The `getrandom_backend` cfg selects getrandom 0.3's browser RNG
# backend (pulled transitively by ahash) for the WebAssembly build in
# `crates/poc2-wasm`. Scoped to the wasm32 target only — native builds (the
# default x86_64 gate) are entirely unaffected.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
