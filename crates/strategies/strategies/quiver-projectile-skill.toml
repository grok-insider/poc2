# Quiver: %IncreasedAttackDamage + ProjectileSpeed + +ProjectileSkillLevel
# M15.1 — quiver projectile template.

id = "quiver-projectile-skill"
name = "Quiver: %Attack + ProjSpeed + +Projectile Skill"
patch_min = "0.4.0"
item_classes = ["Quiver"]
attribute_pools = ["dex", "str_dex"]
expected_cost_div = [15, 80]
expected_success_prob = [0.06, 0.22]
confidence = "community"
note = "Quiver: %AttackDamage prefix + +ProjectileSkillLevel prefix + ProjectileSpeed suffix + AS suffix."

[source]
kind = "user"
credit = "project-author"
reference = "M15.1"

preconditions = [
    { ilvl = { op = "gte", value = 82 } },
    { rarity = "normal" },
    { corrupted = false },
    { mirrored = false },
]

[target]
constraints = []

[[target.prefixes]]
concept = "AttackDamage"
count = 1
min_tier = 1

[[target.prefixes]]
concept = "AddedSkillLevel"
count = 1
min_tier = 1

[[target.suffixes]]
concept = "AttackSpeed"
count = 1
min_tier = 2

[[target.suffixes]]
concept = "ProjectileSpeed"
count = 1
min_tier = 2

abandon_criteria = [
    { corrupted = true },
    { sanctified = true },
]

[[steps]]
id = "S1-perfect-transmute"
action = { kind = "apply_currency", currency = "PerfectOrbOfTransmutation" }
target_check = { any = [
    { has_concept = { concept = "AttackDamage", affix = "prefix" } },
    { has_concept = { concept = "AddedSkillLevel", affix = "prefix" } },
] }
on_success = "S2-perfect-augment"
on_failure = "S1b-restart"

[[steps]]
id = "S1b-restart"
action = { kind = "abandon", reason = "Transmute missed both prefixes; restart cheaper." }

[[steps]]
id = "S2-perfect-augment"
action = { kind = "apply_currency", currency = "PerfectOrbOfAugmentation" }
on_success = "S3-greater-essence"
on_failure = "S3-greater-essence"

[[steps]]
id = "S3-greater-essence"
action = { kind = "apply_currency", currency = "GreaterEssenceOfBattle" }
target_check = { rarity = "rare" }
on_success = "S4-exalt-fill"
on_failure = "S4-exalt-fill"

[[steps]]
id = "S4-exalt-fill"
action = { kind = "apply_currency", currency = "PerfectExaltedOrb" }
target_check = { mod_count = { op = "gte", value = 5 } }
on_success = "S5-divine"
on_failure = "S4-exalt-fill"

[[steps]]
id = "S5-divine"
action = { kind = "apply_currency", currency = "DivineOrb" }
on_success = "S6-vaal-finish"
on_failure = "S6-vaal-finish"

[[steps]]
id = "S6-vaal-finish"
action = { kind = "apply_currency", currency = "VaalOrb", omens = ["OmenOfCorruption"] }
on_success = "S7-done"
on_failure = "S7-done"

[[steps]]
id = "S7-done"
action = { kind = "done" }
