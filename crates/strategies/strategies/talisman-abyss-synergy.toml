# Talisman: Abyss-synergy desecrate chain
# M15.1 — talisman desecration template using Collarbone for jewellery
# class. Talismans are the new 0.4 weapon class accepting collarbones.

id = "talisman-abyss"
name = "Talisman: Abyss-Synergy Desecrate Chain"
patch_min = "0.4.0"
item_classes = ["Talisman"]
attribute_pools = ["str", "dex", "int", "str_dex", "str_int", "dex_int"]
expected_cost_div = [25, 120]
expected_success_prob = [0.06, 0.20]
confidence = "community"
note = "Talisman desecrate chain: build to Rare via Magic-promotion, then Collarbone-with-Necromancy to seed an abyss-tagged hidden mod, reveal at the Well of Souls, finish with Vaal."

[source]
kind = "user"
credit = "project-author"
reference = "M15.1"

preconditions = [
    { ilvl = { op = "gte", value = 82 } },
    { rarity = "normal" },
    { corrupted = false },
    { mirrored = false },
]

[target]
constraints = []

[[target.prefixes]]
concept_any = ["Life", "EnergyShield", "AttackDamage"]
count = 1
min_tier = 1
allow_hybrid = true

[[target.suffixes]]
concept_any = ["FireResistance", "ColdResistance", "LightningResistance", "AllResistances"]
count = 2
min_tier = 2

abandon_criteria = [
    { corrupted = true },
    { sanctified = true },
]

[[steps]]
id = "S1-perfect-transmute"
action = { kind = "apply_currency", currency = "PerfectOrbOfTransmutation" }
on_success = "S2-perfect-augment"
on_failure = "S2-perfect-augment"

[[steps]]
id = "S2-perfect-augment"
action = { kind = "apply_currency", currency = "PerfectOrbOfAugmentation" }
on_success = "S3-perfect-regal"
on_failure = "S3-perfect-regal"

[[steps]]
id = "S3-perfect-regal"
action = { kind = "apply_currency", currency = "PerfectRegalOrb" }
target_check = { rarity = "rare" }
on_success = "S4-bone-with-necromancy"
on_failure = "S4-bone-with-necromancy"

[[steps]]
id = "S4-bone-with-necromancy"
action = { kind = "apply_currency", currency = "PreservedCollarbone", omens = ["OmenOfDextralNecromancy"] }
target_check = { has_hidden_desecrated = true }
on_success = "S5-reveal"
on_failure = "S4-bone-with-necromancy"

[[steps]]
id = "S5-reveal"
action = { kind = "reveal", prefer = ["AllResistances", "FireResistance", "ChaosResistance"], use_abyssal_echoes = true }
on_success = "S6-exalt-fill"
on_failure = "S6-exalt-fill"

[[steps]]
id = "S6-exalt-fill"
action = { kind = "apply_currency", currency = "PerfectExaltedOrb" }
target_check = { mod_count = { op = "gte", value = 5 } }
on_success = "S7-vaal-finish"
on_failure = "S6-exalt-fill"

[[steps]]
id = "S7-vaal-finish"
action = { kind = "apply_currency", currency = "VaalOrb", omens = ["OmenOfCorruption"] }
on_success = "S8-done"
on_failure = "S8-done"

[[steps]]
id = "S8-done"
action = { kind = "done" }
