# 99. Catalyst recommendations (jewelry-specific).
# These rules don't fit /docs/34's 13-section taxonomy cleanly because
# catalysts are an item-class-specific quality currency. They feed into
# Exalt-vs-Desecrate decisions for rings/amulets (base catalysts) and
# jewels (Refined catalysts).
#
# PoE2 0.5 (poe2db catalysts.html): exactly 24 catalysts — 12 base kinds
# that apply to "a ring or amulet" and 12 "Refined" variants that apply
# to "a jewel". Belts take no catalyst. The PoE1 names "Intrinsic
# Catalyst" / "Unstable Catalyst" do not exist; caster = Sibilant,
# attribute = Adaptive.

[[rule]]
id = "R090-flesh-catalyst-on-life-rare-jewelry"
category = "other"
explanation = "Catalysts multiply tag-matching mod values; quality is consumed by Catalysing Exaltation later. 0.5: base catalysts apply to rings and amulets only (not belts)."
source = "/docs/33 §18 (Catalysing Exaltation) + poe2db catalysts.html (0.5)"
confidence = "community"

[rule.when]
all = [
    { rarity = "rare" },
    { item_class_any = ["Ring", "Amulet"] },
    { corrupted = false },
    { has_concept = { concept = "Life" } },
]

[[rule.then]]
note = "Rare ring/amulet with a life mod: Flesh Catalyst boosts life-tagged mods by +5%/apply (cap 20%)."
priority = 110
[rule.then.action]
kind = "apply_currency"
currency = "FleshCatalyst"
omens = []

