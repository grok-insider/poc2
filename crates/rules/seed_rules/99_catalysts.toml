[[rule]]
id = "R093-adaptive-catalyst-is-attribute-tag"
category = "other"
explanation = "0.5: Adaptive Catalyst is the fixed attribute-tag catalyst (+5%/apply like every other catalyst). The PoE1-style wildcard/breach-tag behaviour does not exist, and belts cannot be catalysed at all — base catalysts gate on rings/amulets, Refined on jewels."
source = "poe2db catalysts.html (0.5)"
confidence = "verified"

[rule.when]
all = [
    { rarity = "rare" },
    { item_class_any = ["Ring", "Amulet"] },
    { corrupted = false },
]

[[rule.then]]
note = "Adaptive Catalyst enhances Attribute modifiers (+5%/apply, cap 20%). Use it on attribute-stacking rings/amulets; Refined Adaptive Catalyst is the jewel equivalent."
priority = 60
tag = "meta"
[rule.then.action]
kind = "guidance"

# =====================================================================
# M15.3 — Catalyst quality mechanics rules.
# =====================================================================

# R229 — Tag-mismatch resets quality to 0
[[rule]]
id = "R229-catalyst-tag-mismatch-resets-quality"
category = "other"
explanation = "Engine Catalyst::apply checks the item's QualityKind; switching from a Tagged(A) catalyst to a Tagged(B) catalyst (or from Untagged with non-zero quality to any Tagged) resets quality to 0 before applying the new catalyst's increment. Stacking different catalyst types wastes prior quality."
source = "/docs/34 §99 (M15.3 R229) + engine Catalyst::apply quality-kind switch"
confidence = "verified"

[rule.when]
all = [
    { item_class_any = ["Ring", "Amulet", "Jewel"] },
    { quality = { op = "gte", value = 5 } },
    { corrupted = false },
]

[[rule.then]]
note = "Quality is tagged to the last catalyst used. Switching catalyst tags resets quality to 0 — commit to one tag (Flesh / Neural / Reaver / Sibilant / Carapace / Adaptive / ...) per craft."
priority = 35
tag = "meta"
[rule.then.action]
kind = "guidance"

# ---------------------------------------------------------------------
# R230 — Quality boosts tag-matching mod *values*, not roll chances
[[rule]]
id = "R230-catalyst-quality-boosts-mod-values"
category = "other"
explanation = "Tagged catalyst quality boosts the rolled values of tag-matching mods by +1% per quality (cap +20% at full quality, 4x +5%/apply). It does NOT bias which mods roll: quality converts into mod-roll chance only via Omen of Catalysing Exaltation, which consumes the quality to bias the next Exalted Orb toward the tag."
source = "/docs/34 §99 (M15.3 R230) + /docs/33 §18 (Catalysing Exaltation)"
confidence = "verified"

[rule.when]
all = [
    { item_class_any = ["Ring", "Amulet", "Jewel"] },
    { quality = { op = "gte", value = 15 } },
    { rarity = "rare" },
]

[[rule.then]]
note = "Catalyst quality at 15+ multiplies tag-matching mod values, but it does not change Exalt odds by itself. To convert quality into a tag-biased slam, pair the finishing Exalt with Omen of Catalysing Exaltation (consumes the quality)."
priority = 95
tag = "meta"
[rule.then.action]
kind = "guidance"
