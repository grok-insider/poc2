id = "R041-reveal-with-abyssal-echoes"
category = "exalt_vs_desecrate"
when = { has_hidden_desecrated = true }
explanation = "After bone, reveal converts the hidden mod into a real one."
source = "User worked example, step 8"
confidence = "verified"

[[rule.then]]
