# §4.10 — Bones cheap, exalts scarce (early league)
[[rule]]
id = "R331-bones-cheap-early-league-prefer"
category = "exalt_vs_desecrate"
when = "always"
explanation = "Bones drop from Abyssal Fissures and scale with Atlas tree — abundant in week 1–2 vs scarce Greater/Perfect Exalts."
source = "/docs/34 §4.10 (MEDIUM-DESEC)"
confidence = "community"

[[rule.then]]
note = "Early league tip: bones are typically more abundant than Greater/Perfect Exalts in week 1–2. Lean on bones for filling slots when exalts are scarce."
priority = 30
tag = "league_advice"
[rule.then.action]
kind = "guidance"
