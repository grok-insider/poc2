# 4. Exalt-vs-Desecrate Choice
# Per /docs/34 §4.

[[rule]]
id = "R040-bone-with-dextral-necromancy"
category = "exalt_vs_desecrate"
explanation = "User's worked-example pattern: bone hidden mod into the side you control."
source = "User project-author worked example"
confidence = "verified"

[rule.when]
all = [
    { rarity = "rare" },
    { affix_count = { affix = "prefix", count = { op = "eq", value = 3 } } },
    { affix_count = { affix = "suffix", count = { op = "lte", value = 1 } } },
    { has_hidden_desecrated = false },
    { has_fractured = false },
]

[[rule.then]]
note = "Prefixes complete. Preserved Rib + Dextral Necromancy adds a hidden suffix while preserving the open suffix slot for free choice at reveal."
priority = 220
[rule.then.action]
kind = "apply_currency"
currency = "PreservedRib"
omens = ["OmenOfDextralNecromancy"]

# ---------------------------------------------------------------------

[[rule]]
id = "R041-reveal-with-abyssal-echoes"
category = "exalt_vs_desecrate"
when = { has_hidden_desecrated = true }
explanation = "After bone, reveal converts the hidden mod into a real one."
source = "User worked example, step 8"
confidence = "verified"

[[rule.then]]
note = "Reveal at the Well of Souls. Pair with Omen of Abyssal Echoes for a 3+3 choice."
priority = 230
[rule.then.action]
kind = "reveal"

# ---------------------------------------------------------------------

[[rule]]
id = "R070-essence-with-crystallisation-suffix-swap"
category = "exalt_vs_desecrate"
explanation = "User's worked-example culminating step."
source = "User project-author worked example"
confidence = "verified"

[rule.when]
all = [
    { rarity = "rare" },
    { has_fractured = true },
    { affix_count = { affix = "prefix", count = { op = "eq", value = 3 } } },
    { affix_count = { affix = "suffix", count = { op = "gte", value = 1 } } },
    { corrupted = false },
]

[[rule.then]]
note = "All 3 prefixes present and at least one suffix. Perfect Essence + Dextral Crystallisation swaps a bad suffix for the Seeking suffix without touching prefixes."
priority = 200
[rule.then.action]
kind = "apply_currency"
currency = "PerfectEssenceOfSeeking"
omens = ["OmenOfDextralCrystallisation"]

# ---------------------------------------------------------------------

[[rule]]
id = "R130-omen-of-light-on-rare-with-bad-desecrated"
category = "exalt_vs_desecrate"
explanation = "Omen of Light is the keystone trick for desecrated-mod cleanup."
source = "/docs/33 §9"
confidence = "community"

[rule.when]
all = [
    { rarity = "rare" },
    { has_desecrated_revealed = true },
]

[[rule.then]]
note = "Omen of Light + Annul removes ONLY desecrated mods. Use this whenever a desecrated mod is unwanted."
priority = 90
[rule.then.action]
kind = "apply_currency"
currency = "OrbOfAnnulment"
omens = ["OmenOfLight"]

