# §4.8 — Mark of the Abyss combo (Essence of the Abyss before bone)
[[rule]]
id = "R330-mark-of-the-abyss-combo"
category = "exalt_vs_desecrate"
explanation = "Essence of the Abyss + bone guarantees a higher-mod-level desecrated mod than the original."
source = "/docs/34 §4.8 (MOBA-ABYSS)"
confidence = "community"

[rule.when]
all = [
    { rarity = "rare" },
    { mod_count = { op = "eq", value = 6 } },
    { has_hidden_desecrated = false },
    { has_desecrated_revealed = false },
]

[[rule.then]]
note = "Apply Essence of the Abyss BEFORE the bone to guarantee the next desecrated mod is higher-mod-level than the originally-removed mod (Mark of the Abyss combo, see strategy #20)."
priority = 195
[rule.then.action]
kind = "apply_currency"
currency = "EssenceOfTheAbyss"
omens = ["OmenOfDextralCrystallisation"]

