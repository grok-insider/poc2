    { has_fractured = true },
    { affix_count = { affix = "prefix", count = { op = "eq", value = 3 } } },
    { affix_count = { affix = "suffix", count = { op = "gte", value = 1 } } },
    { corrupted = false },
]

[[rule.then]]
note = "All 3 prefixes present and at least one suffix. Perfect Essence + Dextral Crystallisation swaps a bad suffix for the Seeking suffix without touching prefixes."
