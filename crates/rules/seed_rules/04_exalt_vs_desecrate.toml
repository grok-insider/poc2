[[rule]]
id = "R160-perfect-exalt-with-homogenising-on-isolated-rare"
category = "exalt_vs_desecrate"
explanation = "Open-prefix-only is the canonical isolated Exalt setup."
source = "/docs/34 §4.3"
confidence = "verified"

[rule.when]
all = [
    { rarity = "rare" },
    { corrupted = false },
    { sanctified = false },
    { affix_count = { affix = "prefix", count = { op = "lte", value = 2 } } },
    { affix_count = { affix = "suffix", count = { op = "eq", value = 3 } } },
]

[[rule.then]]
note = "Suffixes complete (3/3) but prefix slot open. Sinistral Exaltation forces the slam to land prefix; Perfect Exalt guarantees min-mod-level 50."
priority = 215
[rule.then.action]
kind = "apply_currency"
currency = "PerfectExaltedOrb"
omens = ["OmenOfSinistralExaltation"]

