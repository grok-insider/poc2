[[rule]]
id = "R171-whittle-warning-essence-mods-low-mlvl"
category = "whittle_vs_annul"
explanation = "VULKK rulebook safety note; pair with stat-pin in UI before commit."
source = "/docs/34 §5.7"
confidence = "community"

[rule.when]
