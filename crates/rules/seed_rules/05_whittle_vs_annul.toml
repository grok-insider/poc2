tag = "warning"
[rule.then.action]
kind = "guidance"

# ---------------------------------------------------------------------
# §5.5 — Omen of Light + Annul to remove unwanted desecrated
[[rule]]
id = "R340-light-annul-removes-only-desecrated"
category = "whittle_vs_annul"
explanation = "Your next Orb of Annulment will remove only Desecrated Modifiers — deterministic for the desecrated mod."
source = "/docs/34 §5.5 (MOBA-OMEN, AOEAH-GMC)"
confidence = "verified"

[rule.when]
all = [
    { rarity = "rare" },
    { has_desecrated_revealed = true },
]

[[rule.then]]
note = "Omen of Light + Annul = guaranteed to remove only desecrated mods. With one revealed desecrated mod, this is fully deterministic."
priority = 240
[rule.then.action]
kind = "apply_currency"
currency = "OrbOfAnnulment"
omens = ["OmenOfLight"]

# ---------------------------------------------------------------------
# §5.8 — Pin item before Whittling Chaos to confirm target
[[rule]]
id = "R341-whittle-pin-item-before-commit"
category = "whittle_vs_annul"
when = "always"
explanation = "Pin the item then hover with Chaos Orb to see highlight before commit."
source = "/docs/34 §5.8 (VULKK)"
confidence = "verified"

[[rule.then]]
note = "Workflow tip: pin the item stats, then hover with Chaos Orb to confirm which mod gets replaced. Always pin before high-stakes Whittle commits."
priority = 35
tag = "meta"
[rule.then.action]
kind = "guidance"
