# 5. Whittle-vs-Annul Choice
# Per /docs/34 §5.

[[rule]]
id = "R050-whittle-when-low-tier-prefix-survives"
category = "whittle_vs_annul"
explanation = "Whittling targets cleanup precisely."
source = "Goratha live-craft"
confidence = "community"

[rule.when]
all = [
    { rarity = "rare" },
    { has_fractured = true },
    { affix_count = { affix = "prefix", count = { op = "gte", value = 2 } } },
]

[[rule.then]]
note = "Fracture is locked in. Chaos + Whittling surgically removes the lowest-required-level mod."
priority = 210
[rule.then.action]
kind = "apply_currency"
currency = "ChaosOrb"
omens = ["OmenOfWhittling"]

# ---------------------------------------------------------------------

[[rule]]
id = "R110-annul-magic-stage-when-one-junk-mod"
category = "whittle_vs_annul"
explanation = "Magic-stage Annul-Aug spam refines a base before Regal."
source = "/docs/33 §3"
confidence = "community"

[rule.when]
all = [
    { rarity = "magic" },
    { affix_count = { affix = "prefix", count = { op = "eq", value = 1 } } },
    { affix_count = { affix = "suffix", count = { op = "eq", value = 1 } } },
    { corrupted = false },
]

[[rule.then]]
note = "Magic with 2 mods, one junk: Annul is 50/50 to remove the junk. Cycle Aug after."
priority = 130
[rule.then.action]
kind = "apply_currency"
currency = "OrbOfAnnulment"
omens = []

