# Packaging (ADR-0010): Linux AppImage/deb + Windows 11 NSIS.
# Run from apps/desktop: bun run dist:linux / dist:win (CI does this on
# ubuntu-latest / windows-latest; NixOS dev-runs use nixpkgs electron).
appId: ai.anomaly.poc2
productName: Path of Crafting 2
directories:
  output: dist-packages
  buildResources: build
files:
  - dist/**/*
  - package.json
extraResources:
  # The web static export (bun run build at repo root produces apps/web/out).
  - from: ../web/out
    to: web
linux:
  target:
    - AppImage
    - deb
  category: Game
  icon: build/icon.png
  executableName: poc2-desktop
  # Avoid scoped @poc2/desktop artifact paths (fpm fails when parent @poc2/ is missing).
  artifactName: poc2-desktop-${version}.${ext}
  # deb maintainer (electron-builder also falls back to package.json author).
  maintainer: "grok-insider <289870065+grok-insider@users.noreply.github.com>"
deb:
  # Debian package name must be lowercase with no spaces/scope.
  packageName: poc2-desktop
win:
  target:
    - nsis
  icon: build/icon.ico
  extraResources:
    - from: ../../target/release/poc2-windows-ocr.exe
      to: windows-ocr/poc2-windows-ocr.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
# GitHub Releases feed for electron-updater (baked into app-update.yml at
# package time). CI still uses `--publish never` so release-plz owns the
# Release; artifacts + latest*.yml are uploaded with `gh release upload`.
# Builds are intentionally unsigned (OSS — no paid code-signing certs).
publish:
  provider: github
  owner: grok-insider
  repo: poc2
  releaseType: release
