# Packaging (ADR-0010): Linux AppImage/deb + Windows 11 NSIS.
# Run from apps/desktop: bun run dist:linux / dist:win (CI does this on
# ubuntu-latest / windows-latest; NixOS dev-runs use nixpkgs electron).
appId: ai.anomaly.poc2
productName: Path of Crafting 2
directories:
  output: dist-packages
  buildResources: build
files:
  - dist/**/*
  - package.json
extraResources:
  # The web static export (bun run build at repo root produces apps/web/out).
  - from: ../web/out
    to: web
linux:
  target:
    - AppImage
    - deb
  category: Game
  icon: build/icon.png
  executableName: poc2-desktop
win:
  target:
    - nsis
  icon: build/icon.ico
  extraResources:
    - from: ../../target/release/poc2-windows-ocr.exe
      to: windows-ocr/poc2-windows-ocr.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
